spring.application.name=deviceregistrationandtelemetrybackend

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Respect X-Forwarded-* / Forwarded headers so redirects preserve external scheme/host/port
server.forward-headers-strategy=framework

# ----------------------------
# Azure IoT Hub integration
# ----------------------------
# When these are not set, the app automatically falls back to a local stub.
# Provide via environment variables:
#   AZURE_IOT_HUB_HOSTNAME="yourhub.azure-devices.net"
#   AZURE_IOT_HUB_SAS_TOKEN="SharedAccessSignature sr=...&sig=...&se=...&skn=..."
# Optional:
#   AZURE_IOT_HUB_API_VERSION="2021-04-12"
azure.iothub.hostname=${AZURE_IOT_HUB_HOSTNAME:}
azure.iothub.sas-token=${AZURE_IOT_HUB_SAS_TOKEN:}
azure.iothub.api-version=${AZURE_IOT_HUB_API_VERSION:2021-04-12}
